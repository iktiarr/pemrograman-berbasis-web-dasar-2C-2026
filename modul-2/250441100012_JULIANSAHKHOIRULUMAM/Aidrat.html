<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
margin: 0;
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aidrat Sunan Drajad</title>

<style>
    /* RESET */
    * {
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f9ff;
    }

    /* NAVBAR */
    nav {
        display: flex;
        justify-content: space-between;
        padding: 20px;
        background-color: #0077b6;
        color: white;
    }

    nav h1 {
        font-size: 24px;
    }

    nav ul {
        display: flex;
        list-style: none;
        gap: 20px;
    }

    nav ul li {
        cursor: pointer;
    }

    /* HERO */
    .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 50px;
    }

    .hero-text {
        max-width: 50%;
    }

    .hero-text h2 {
        font-size: 40px;
        color: #023e8a;
    }

    .hero-text p {
        margin: 20px 0;
        font-size: 18px;
        color: #555;
    }

    .hero-text button {
        padding: 100px 20px;
        background-color: #00b4d8;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 5px;
    }

    .hero img {
        width: 300px;
    }

    /* FITUR */
    .fitur {
        display: flex;
        justify-content: space-around;
        padding: 40px;
        background-color: #caf0f8;
    }

    .box {
        width: 200px;
        text-align: center;
    }

    .box h3 {
        color: #0077b6;
    }

    /* FOOTER */
    footer {
        text-align: center;
        padding: 20px;
        background-color: #0077b6;
        color: white;
    }
</style>

</head>
<body>

<!-- NAVBAR -->
<nav>
    <h1>Aidrat</h1>
    <ul>
        <li>Home</li>
        <li>Produk</li>
        <li>Kontak</li>
    </ul>
</nav>

<!-- HERO SECTION -->
<section class="hero">
    <div class="hero-text">
        <h2>Airdrat</h2>
        <p>
            Aidrat adalah Air asli Sunan Drajad.
        </p>
        <button>Beli Sekarang</button>
    </div>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSLRUh0tcy71VER8Smyi2tNSg1jsVAw1BSW9Q&s" alt="Air Mineral">
</section>

<!-- FITUR -->
<section class="fitur">
    <div class="box">
        <h3>100% Murni</h3>
        <p>Air alami tanpa campuran bahan kimia.</p>
    </div>

    <div class="box">
        <h3>Segar</h3>
        <p>Memberikan kesegaran sepanjang hari.</p>
    </div>

    <div class="box">
        <h3>Sehat</h3>
        <p>Menjaga keseimbangan cairan tubuh.</p>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 AquaFresh - Semua Hak Dilindungi</p>
</footer>

</body>
</html>
